version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trip2go-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    restart: unless-stopped
    networks:
      - trip2go-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trip2go-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - trip2go-network

networks:
  trip2go-network:
    driver: bridge