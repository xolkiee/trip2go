openapi: 3.0.3
info:
  title: Trip2Go Bilet Rezervasyon API'si
  version: 1.0.0
  description: >
    Bu API, Trip2Go otobüs ve uçak bileti rezervasyon sistemi için tasarlanmış bir RESTful servistir. 
    Kullanıcı yönetimi, sefer arama, rezervasyon, bilet satın alma ve yorum işlemleri gibi temel 
    süreçleri tam destekler. API, JWT tabanlı kimlik doğrulama ile korunmaktadır.
  contact:
    name: Yazılım Mühendisliği Proje Ekibi

servers:
  - url: https://api.trip2go.com
    description: Üretim sunucusu (Production)
  - url: https://localhost:3000
    description: Yerel geliştirme sunucusu (Development)

tags:
  - name: Kimlik Doğrulama
    description: Kullanıcı kayıt, giriş ve şifre işlemleri
  - name: Rezervasyon
    description: Koltuk rezerve etme ve iptal işlemleri
  - name: Biletler
    description: Bilet satın alma, iptal ve yolcu bilgisi güncelleme
  - name: Admin İşlemleri
    description: Sistem yöneticisi için sefer yönetimi
  - name: Kullanıcı Profili
    description: Kullanıcı hesap bilgileri ve yönetimi
  - name: Seferler ve Lokasyonlar
    description: Şehir/Havalimanı listesi ve detaylı sefer arama
  - name: Yorumlar
    description: Firma ve sefer değerlendirmeleri

security:
  - BearerAuth: []

paths:
  # ==========================================
  # KİMLİK DOĞRULAMA
  # ==========================================
  /api/auth/register:
    post:
      tags: [Kimlik Doğrulama]
      summary: Kullanıcı Kaydı (Ömer Arı)
      description: Sisteme yeni bir kullanıcının kayıt olmasını sağlar. İsim, e-posta ve şifre gibi temel bilgiler alınarak veritabanında yeni bir yolcu profili oluşturulur.
      operationId: registerUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterInput'
      responses:
        "201":
          description: Kullanıcı başarıyla oluşturuldu ve veritabanına kaydedildi.
        "400":
          description: Geçersiz istek (Bad Request). Gönderilen veri formatı hatalı, zorunlu alanlar eksik veya geçersiz e-posta formatı girilmiş.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "409":
          description: Çakışma (Conflict). Girilen e-posta adresi ile sistemde zaten kayıtlı bir kullanıcı bulunuyor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "500":
          description: Sunucu Hatası (Internal Server Error). Kayıt işlemi sırasında sunucu tarafında beklenmeyen bir hata meydana geldi.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/auth/login:
    post:
      tags: [Kimlik Doğrulama]
      summary: Kullanıcı Girişi (Ömer Arı)
      description: Kayıtlı kullanıcıların e-posta ve şifreleriyle sisteme giriş yapmasını sağlar. Başarılı giriş sonrası erişim yetkisi (JWT token) döner.
      operationId: loginUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInput'
      responses:
        "200":
          description: Başarılı giriş (OK). Kullanıcı doğrulandı ve JWT token üretildi.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        "400":
          description: Geçersiz istek (Bad Request). İstek gövdesinde e-posta veya şifre bilgisi eksik.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "401":
          description: Yetkisiz (Unauthorized). Girilen e-posta adresine ait kullanıcı bulunamadı veya şifre hatalı.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "500":
          description: Sunucu Hatası (Internal Server Error). Giriş işlemi sırasında sistemde beklenmeyen bir hata oluştu.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/auth/password-reset:
    post:
      tags: [Kimlik Doğrulama]
      summary: Şifremi Unuttum (Ömer Arı)
      description: Şifresini unutan kullanıcıların e-posta adreslerine şifre sıfırlama bağlantısı gönderilmesini sağlar. (Gereksinim 3 - Adım 1)
      operationId: forgotPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
              required:
                - email
      responses:
        "200":
          description: İşlem başarılı (OK). Şifre sıfırlama bağlantısı kullanıcının e-posta adresine gönderildi.
        "400":
          description: Geçersiz istek (Bad Request). E-posta formatı geçersiz veya eksik.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "404":
          description: Bulunamadı (Not Found). Girilen e-posta adresine sahip bir kullanıcı sistemde kayıtlı değil.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "500":
          description: Sunucu Hatası (Internal Server Error). E-posta gönderim servisinde veya sunucuda hata oluştu.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      tags: [Kimlik Doğrulama]
      summary: Şifre Sıfırlama (Ömer Arı)
      description: Kullanıcının e-postasına gelen güvenli token aracılığıyla yeni şifresini belirlemesini sağlar. (Gereksinim 3 - Adım 2)
      operationId: resetPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
                newPassword:
                  type: string
                  format: password
              required:
                - token
                - newPassword
      responses:
        "200":
          description: Başarılı (OK). Kullanıcının şifresi güvenli bir şekilde güncellendi.
        "400":
          description: Geçersiz istek (Bad Request). Yeni şifre güvenlik kriterlerini (uzunluk, karakter vb.) karşılamıyor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "401":
          description: Yetkisiz (Unauthorized). Şifre sıfırlama token'ı geçersiz, kullanılmış veya süresi dolmuş.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "500":
          description: Sunucu Hatası (Internal Server Error). Şifre güncelleme veritabanı işlemi sırasında hata oluştu.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ==========================================
  # REZERVASYON
  # ==========================================
  /api/reservations:
    post:
      tags: [Rezervasyon]
      summary: Koltuk Rezerve Etme (Furkan Burak Öztürk)
      description: Kullanıcıların seçtikleri bir uçuş veya otobüs seferi için belirli bir koltuğu geçici süreliğine ayırtmasını sağlar.
      operationId: createReservation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReservationInput'
      responses:
        "201":
          description: Oluşturuldu (Created). Koltuk başarıyla rezerve edildi ve kullanıcı adına geçici olarak kilitlendi.
        "400":
          description: Geçersiz istek (Bad Request). Gönderilen sefer ID'si veya koltuk numarası formatı hatalı.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "401":
          description: Yetkisiz (Unauthorized). İstek başlığında geçerli bir JWT token bulunamadı. Lütfen giriş yapın.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "404":
          description: Bulunamadı (Not Found). Rezerve edilmek istenen sefer sistemde aktif değil veya bulunamadı.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "409":
          description: Çakışma (Conflict). İstenen koltuk başka bir kullanıcı tarafından zaten rezerve edilmiş veya satın alınmış.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "500":
          description: Sunucu Hatası (Internal Server Error). Rezervasyon işlemi sırasında sunucuda beklenmeyen bir hata oluştu.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/reservations/{id}:
    parameters:
      - $ref: '#/components/parameters/pathId'
    delete:
      tags: [Rezervasyon]
      summary: Rezervasyon İptali (Furkan Burak Öztürk)
      description: Kullanıcının daha önceden yapmış olduğu geçici koltuk rezervasyonunu iptal etmesini ve o koltuğun boşa çıkmasını sağlar.
      operationId: cancelReservation
      responses:
        "204":
          description: İçerik Yok (No Content). Rezervasyon başarıyla iptal edildi ve sistemden silindi.
        "400":
          description: Geçersiz istek (Bad Request). URL parametresindeki ID formatı geçersiz.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "401":
          description: Yetkisiz (Unauthorized). Kimlik doğrulama başarısız. Token eksik veya geçersiz.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "403":
          description: Yasaklı (Forbidden). Silinmek istenen rezervasyon başka bir kullanıcıya ait.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "404":
          description: Bulunamadı (Not Found). İptal edilmek istenen rezervasyon sistemde bulunamadı veya süresi zaten dolmuş.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "500":
          description: Sunucu Hatası (Internal Server Error). İptal işlemi sırasında veritabanı veya sunucu hatası meydana geldi.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ==========================================
  # BİLETLER
  # ==========================================
  /api/tickets:
    post:
      tags: [Biletler]
      summary: Bilet Satın Alma (Furkan Burak Öztürk)
      description: Seçilen sefer ve koltuk için ödeme adımlarının tamamlanarak biletin kalıcı olarak onaylanmasını ve oluşturulmasını sağlar.
      operationId: purchaseTicket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TicketInput'
      responses:
        "201":
          description: Oluşturuldu (Created). Ödeme başarıyla alındı ve bilet kesinleşti.
        "400":
          description: Geçersiz istek (Bad Request). Ödeme bilgileri eksik, bakiye yetersiz veya gönderilen veriler hatalı.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "401":
          description: Yetkisiz (Unauthorized). Kullanıcı oturumu bulunamadı. Token eksik veya hatalı.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "404":
          description: Bulunamadı (Not Found). Seçilen sefer sistemde bulunamadı.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "409":
          description: Çakışma (Conflict). Satın alınmak istenen koltuk başkasına ait veya araç dolmuş durumda.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "500":
          description: Sunucu Hatası (Internal Server Error). Ödeme altyapısında veya bilet oluşturma servisinde hata meydana geldi.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/tickets/{id}:
    parameters:
      - $ref: '#/components/parameters/pathId'
    delete:
      tags: [Biletler]
      summary: Bilet İptal Etme (Furkan Burak Öztürk)
      description: Satın alınmış olan kesinleşmiş bir biletin iptal edilmesini ve kurallara bağlı olarak iade süreçlerinin başlatılmasını sağlar.
      operationId: cancelTicket
      responses:
        "200":
          description: Başarılı (OK). Bilet başarıyla iptal edildi ve ücret iade süreci başlatıldı.
        "400":
          description: Geçersiz istek (Bad Request). Seferin kalkmasına çok kısa bir süre kaldığı için bilet iptal kurallarına uymuyor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "401":
          description: Yetkisiz (Unauthorized). İşlemi yapmak için geçerli bir token sağlanmadı.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "403":
          description: Yasaklı (Forbidden). İptal edilmek istenen bilet oturum açmış olan kullanıcıya ait değil.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "404":
          description: Bulunamadı (Not Found). Belirtilen ID'ye sahip bilet sistemde bulunamadı.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "500":
          description: Sunucu Hatası (Internal Server Error). İptal veya iade işlemi esnasında sistemsel bir sorun oluştu.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/tickets/{id}/passenger:
    parameters:
      - $ref: '#/components/parameters/pathId'
    put:
      tags: [Biletler]
      summary: Yolcu Bilgilerini Güncelleme (Furkan Burak Öztürk)
      description: Bilet satın alınan yolcunun sisteme girilen kimlik, isim veya iletişim bilgilerinin sonradan düzenlenmesini sağlar.
      operationId: updatePassengerInfo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PassengerInput'
      responses:
        "200":
          description: Başarılı (OK). Yolcuya ait bilgiler (isim, TCKN vb.) güncellendi.
        "400":
          description: Geçersiz istek (Bad Request). Girilen TCKN hatalı veya gönderilen veri formatı eksik.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "401":
          description: Yetkisiz (Unauthorized). İşlem için kimlik doğrulama sağlanamadı.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "403":
          description: Yasaklı (Forbidden). Bu bilet üzerinde değişiklik yapma yetkiniz yok (bilet sizin değil).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "404":
          description: Bulunamadı (Not Found). Güncellenmek istenen bilet kaydı bulunamadı.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "500":
          description: Sunucu Hatası (Internal Server Error). Güncelleme işlemi veritabanına yazılamadı.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ==========================================
  # ADMİN İŞLEMLERİ
  # ==========================================
  /api/admin/trips:
    post:
      tags: [Admin İşlemleri]
      summary: Sisteme Yeni Sefer Ekleme (Furkan Burak Öztürk)
      description: Sistem yöneticilerinin (admin) platforma yeni uçak veya otobüs seferleri eklemesini sağlar.
      operationId: addTrip
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TripInput'
      responses:
        "201":
          description: Oluşturuldu (Created). Yeni sefer veritabanına başarıyla eklendi ve satışa açıldı.
        "400":
          description: Geçersiz istek (Bad Request). Gönderilen sefer verilerinde eksiklik var (ör. kalkış saati geçmiş bir tarih).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "401":
          description: Yetkisiz (Unauthorized). Kimlik doğrulama sağlanamadı.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "403":
          description: Yasaklı (Forbidden). Bu işlemi yalnızca "Admin" rolüne sahip kullanıcılar gerçekleştirebilir.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "500":
          description: Sunucu Hatası (Internal Server Error). Sefer eklenirken beklenmeyen bir veritabanı hatası meydana geldi.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/admin/trips/{id}:
    parameters:
      - $ref: '#/components/parameters/pathId'
    put:
      tags: [Admin İşlemleri]
      summary: Sefer Bilgisini Güncelleme (Furkan Burak Öztürk)
      description: Sistem yöneticilerinin mevcut bir seferin gecikme durumu, saati, fiyatı veya araç/uçak tipi gibi detaylarında değişiklik yapmasını sağlar.
      operationId: updateTrip
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TripInput'
      responses:
        "200":
          description: Başarılı (OK). Sefer bilgileri (rötar, fiyat değişikliği vb.) başarıyla güncellendi.
        "400":
          description: Geçersiz istek (Bad Request). Gönderilen güncelleme verisi geçerli şemaya uymuyor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "401":
          description: Yetkisiz (Unauthorized). Kimlik doğrulama token'ı eksik.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "403":
          description: Yasaklı (Forbidden). Bu işlemi gerçekleştirme yetkiniz (Admin rolü) bulunmamaktadır.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "404":
          description: Bulunamadı (Not Found). Güncellenmek istenen sefer sistemde mevcut değil.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "500":
          description: Sunucu Hatası (Internal Server Error). Sunucu tabanlı bir sorundan dolayı güncelleme yapılamadı.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ==========================================
  # KULLANICI PROFİLİ
  # ==========================================
  /api/users/profile:
    get:
      tags: [Kullanıcı Profili]
      summary: Profil Sekmesi (Furkan Burak Öztürk)
      description: Kullanıcının kendi hesap bilgilerine erişmesini sağlar. Temel bilgiler listelenir.
      operationId: getProfile
      responses:
        "200":
          description: Başarılı (OK). Kullanıcının profil verileri getirildi.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        "400":
          description: Geçersiz istek (Bad Request). İstek formati hatalı işlendi.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "401":
          description: Yetkisiz (Unauthorized). Kimliği doğrulanmamış kullanıcı erişimi.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "404":
          description: Bulunamadı (Not Found). Kullanıcı profili veritabanında bulunamadı.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "500":
          description: Sunucu Hatası (Internal Server Error). Profil bilgileri getirilirken sunucuda hata oluştu.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      tags: [Kullanıcı Profili]
      summary: Profil Bilgilerini Güncelleme (Furkan Burak Öztürk)
      description: Kullanıcının ad, soyad, telefon numarası gibi kişisel profil verilerini değiştirmesine olanak tanır.
      operationId: updateProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileUpdateInput'
      responses:
        "200":
          description: Başarılı (OK). Profil verileri başarıyla güncellendi.
        "400":
          description: Geçersiz istek (Bad Request). Güncellenmek istenen veriler geçersiz (örneğin hatalı telefon formatı).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "401":
          description: Yetkisiz (Unauthorized). Geçerli bir oturum token'ı bulunamadı.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "404":
          description: Bulunamadı (Not Found). Güncellenecek profil kaydı bulunamadı.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "500":
          description: Sunucu Hatası (Internal Server Error). Güncelleme işlemi sırasında bilinmeyen bir hata oluştu.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags: [Kullanıcı Profili]
      summary: Hesap Silme (Furkan Burak Öztürk)
      description: Kullanıcının sistemdeki hesabını tamamen kapatmasını ve verilerinin silinmesini sağlar.
      operationId: deleteAccount
      responses:
        "204":
          description: İçerik Yok (No Content). Kullanıcı hesabı sistemden kalıcı olarak silindi.
        "400":
          description: Geçersiz istek (Bad Request). Silme işlemi için gerekli doğrulama adımları eksik.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "401":
          description: Yetkisiz (Unauthorized). Hesabı silmek için aktif bir oturum bulunamadı.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "404":
          description: Bulunamadı (Not Found). Silinecek hesap sistemde bulunmuyor (zaten silinmiş olabilir).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "500":
          description: Sunucu Hatası (Internal Server Error). Hesap silinirken veritabanında bütünlük hatası oluştu.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ==========================================
  # SEFERLER VE LOKASYONLAR
  # ==========================================
  /api/locations:
    get:
      tags: [Seferler ve Lokasyonlar]
      summary: Şehir/Havalimanı Listesini Getirme (Ömer Arı)
      description: Kullanıcıların arama yaparken seçeceği kalkış ve varış noktalarının (otogarlar, havalimanları) listelenmesini sağlar.
      operationId: getLocations
      security: []
      responses:
        "200":
          description: Başarılı (OK). Lokasyon verileri başarıyla listelendi.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Location'
        "400":
          description: Geçersiz istek (Bad Request). İstek parametrelerinde yapısal bir hata var.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "500":
          description: Sunucu Hatası (Internal Server Error). Lokasyon veritabanına bağlanılamadı.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/trips/search:
    get:
      tags: [Seferler ve Lokasyonlar]
      summary: Seferleri Arama (Ömer Arı)
      description: Kullanıcıların belirlediği tarih, güzergah kriterlerine uygun olan aktif otobüs ve uçak seferlerinin filtrelenerek listelenmesini sağlar.
      operationId: searchTrips
      security: []
      parameters:
        - name: departure
          in: query
          required: true
          schema:
            type: string
          description: Kalkış noktası ID'si
        - name: arrival
          in: query
          required: true
          schema:
            type: string
          description: Varış noktası ID'si
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
          description: Kalkış tarihi (YYYY-AA-GG)
      responses:
        "200":
          description: Başarılı (OK). Kriterlere uygun seferler getirildi (boş bir liste de dönebilir).
        "400":
          description: Geçersiz istek (Bad Request). Zorunlu arama parametreleri (kalkış, varış, tarih) eksik veya hatalı formatta.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "500":
          description: Sunucu Hatası (Internal Server Error). Arama motoru veya veritabanında arıza oluştu.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/trips/{id}/details:
    parameters:
      - $ref: '#/components/parameters/pathId'
    get:
      tags: [Seferler ve Lokasyonlar]
      summary: Sefer Detayı ve Koltuk Durumu Getirme (Ömer Arı)
      description: Belirli bir seferin seçilmesi durumunda, aracın/uçağın oturma düzenini, dolu ve boş koltukların anlık durumunu getirir.
      operationId: getTripDetails
      security: []
      responses:
        "200":
          description: Başarılı (OK). Sefer ve koltuk detayları başarıyla getirildi.
        "400":
          description: Geçersiz istek (Bad Request). URL içerisindeki ID formatı hatalı.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "404":
          description: Bulunamadı (Not Found). Detayları istenen sefer ID'si bulunamadı veya sefer iptal edilmiş.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "500":
          description: Sunucu Hatası (Internal Server Error). Koltuk durumları hesaplanırken sunucu hatası meydana geldi.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ==========================================
  # YORUMLAR
  # ==========================================
  /api/reviews:
    post:
      tags: [Yorumlar]
      summary: Firma/Sefer Değerlendirmesi Ekleme (Ömer Arı)
      description: Bilet alıp yolculuğunu tamamlamış kullanıcıların ilgili seyahat firması hakkında puanlama yapmasını sağlar.
      operationId: addReview
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewInput'
      responses:
        "201":
          description: Oluşturuldu (Created). Yorum ve puanlama başarıyla sisteme eklendi.
        "400":
          description: Geçersiz istek (Bad Request). Puan 1-5 aralığında değil veya yorum içeriği kurallara uymuyor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "401":
          description: Yetkisiz (Unauthorized). Yorum yapabilmek için sisteme giriş yapmış olmanız gerekmektedir.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "404":
          description: Bulunamadı (Not Found). Yorum yapılmak istenen sefer bulunamadı.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "500":
          description: Sunucu Hatası (Internal Server Error). Değerlendirme kaydedilirken sunucuda beklenmeyen bir hata oluştu.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/reviews/trip/{id}:
    parameters:
      - $ref: '#/components/parameters/pathId'
    get:
      tags: [Yorumlar]
      summary: Firma/Sefer Yorumlarını Listeleme (Ömer Arı)
      description: Bir seferi satın almak isteyen kullanıcıların, daha önce yapılmış olan değerlendirmeleri okumasını sağlar.
      operationId: getTripReviews
      security: []
      responses:
        "200":
          description: Başarılı (OK). İlgili sefere ait yorumlar listelendi.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReviewOutput'
        "400":
          description: Geçersiz istek (Bad Request). Parametre formatı hatalı gönderilmiş.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "404":
          description: Bulunamadı (Not Found). Yorumları getirilecek olan sefer bulunamadı.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "500":
          description: Sunucu Hatası (Internal Server Error). Yorumlar listelenirken veritabanında okuma hatası oluştu.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/reviews/{id}:
    parameters:
      - $ref: '#/components/parameters/pathId'
    put:
      tags: [Yorumlar]
      summary: Kullanıcının Kendi Yorumunu Düzenlemesi (Ömer Arı)
      description: Kullanıcının daha önceden yapmış olduğu bir değerlendirme metnini veya verdiği puanı sonradan değiştirmesine olanak tanır.
      operationId: updateReview
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewInput'
      responses:
        "200":
          description: Başarılı (OK). Yorum metni ve puanlaması başarıyla güncellendi.
        "400":
          description: Geçersiz istek (Bad Request). Güncellenmek istenen veriler eksik veya hatalı formatta (ör. negatif puan).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "401":
          description: Yetkisiz (Unauthorized). Kullanıcı oturumu bulunamadı.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "403":
          description: Yasaklı (Forbidden). Bu yorumu düzenleme yetkiniz yok, yorum size ait değil.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "404":
          description: Bulunamadı (Not Found). Düzenlenmek istenen yorum sistemde bulunamadı.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "500":
          description: Sunucu Hatası (Internal Server Error). Yorum güncellenirken sunucu tarafında hata oluştu.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags: [Yorumlar]
      summary: Kullanıcının Yorumunu Silmesi (Ömer Arı)
      description: Kullanıcının sistemde görünmesini istemediği, kendisine ait eski bir yorumu kalıcı olarak kaldırmasını sağlar.
      operationId: deleteReview
      responses:
        "204":
          description: İçerik Yok (No Content). Yorum başarıyla silindi ve ortalamalardan düşüldü.
        "400":
          description: Geçersiz istek (Bad Request). Silme isteği URL'i hatalı biçimlendirilmiş.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "401":
          description: Yetkisiz (Unauthorized). Oturum açılmamış.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "403":
          description: Yasaklı (Forbidden). Silmeye çalıştığınız yorum size ait değil.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "404":
          description: Bulunamadı (Not Found). Silinecek yorum veritabanında bulunamadı.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "500":
          description: Sunucu Hatası (Internal Server Error). Silme işlemi sırasında veritabanına ulaşılamadı.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

# ==========================================
# COMPONENTLER (ŞEMALAR VE PARAMETRELER)
# ==========================================
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'İstek başlığına "Authorization: Bearer <token>" eklenmeli.'

  parameters:
    pathId:
      name: id
      in: path
      required: true
      description: İlgili kaynağın benzersiz kimliği (ID)
      schema:
        type: string
        example: "64a7c9f8e4b0"

  schemas:
    Error:
      type: object
      description: Standart hata yanıtı
      properties:
        message:
          type: string
          example: "Sistemde belirtilen işlem gerçekleştirilemedi, girdiğiniz verileri kontrol edin."
      required:
        - message

    AuthResponse:
      type: object
      properties:
        token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        userId:
          type: string
          example: "usr_123"
      required:
        - token
        - userId

    RegisterInput:
      type: object
      properties:
        firstName:
          type: string
          example: "Ahmet"
        lastName:
          type: string
          example: "Yılmaz"
        email:
          type: string
          format: email
          example: "ahmet@example.com"
        password:
          type: string
          format: password
          minLength: 6
          example: "Sifre123!"
      required:
        - firstName
        - lastName
        - email
        - password

    LoginInput:
      type: object
      properties:
        email:
          type: string
          format: email
          example: "ahmet@example.com"
        password:
          type: string
          format: password
          example: "Sifre123!"
      required:
        - email
        - password

    ReservationInput:
      type: object
      properties:
        tripId:
          type: string
          example: "trip_890"
        seatNumber:
          type: string
          example: "12A"
      required:
        - tripId
        - seatNumber

    TicketInput:
      type: object
      properties:
        tripId:
          type: string
          example: "trip_890"
        seatNumber:
          type: string
          example: "12A"
        paymentMethodId:
          type: string
          example: "pm_card_visa"
      required:
        - tripId
        - seatNumber
        - paymentMethodId

    PassengerInput:
      type: object
      properties:
        fullName:
          type: string
          example: "Ahmet Yılmaz"
        identityNumber:
          type: string
          example: "12345678901"
        phone:
          type: string
          example: "+905551234567"
      required:
        - fullName
        - identityNumber
        - phone

    TripInput:
      type: object
      properties:
        departureId:
          type: string
          example: "loc_ist"
        arrivalId:
          type: string
          example: "loc_ank"
        departureTime:
          type: string
          format: date-time
          example: "2026-03-10T14:30:00Z"
        price:
          type: number
          example: 450.50
        capacity:
          type: integer
          example: 40
        type:
          type: string
          enum: [bus, flight]
          example: "bus"
      required:
        - departureId
        - arrivalId
        - departureTime
        - price
        - capacity
        - type

    UserProfile:
      type: object
      properties:
        id:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
      required:
        - id
        - firstName
        - lastName
        - email

    ProfileUpdateInput:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string

    Location:
      type: object
      properties:
        id:
          type: string
          example: "loc_ist"
        name:
          type: string
          example: "İstanbul (Esenler Otogarı)"
        type:
          type: string
          enum: [city, airport, bus_station]
          example: "bus_station"
      required:
        - id
        - name
        - type

    ReviewInput:
      type: object
      properties:
        tripId:
          type: string
          example: "trip_890"
        rating:
          type: integer
          minimum: 1
          maximum: 5
          example: 5
        comment:
          type: string
          example: "Koltuklar çok rahattı, yolculuk tam vaktinde bitti."
      required:
        - tripId
        - rating
        - comment

    ReviewOutput:
      type: object
      properties:
        id:
          type: string
          example: "rev_001"
        authorName:
          type: string
          example: "Ahmet Y."
        rating:
          type: integer
          example: 5
        comment:
          type: string
          example: "Koltuklar çok rahattı, yolculuk tam vaktinde bitti."
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - authorName
        - rating
        - comment